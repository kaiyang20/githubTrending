# This workflow scrapes GitHub weekly trending projects
name: Weekly Github Trending
on:
  schedule:
    # UTC周一0点 = 北京时间周一早上8点自动爬取周榜
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly trending scraper
        run: |
          # 先清空README，只保留标题，避免堆积往年历史数据
          echo "# GitHub 本周热门开源项目 Weekly Trending" > README.md
          python scraper.py --since weekly

      - name: Commit & Push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update weekly trending list" || echo "No new data to commit"
          git push
